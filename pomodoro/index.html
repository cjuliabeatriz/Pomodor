<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro</title>
</head>
<body>
    <h1>Bem-vindo ao Pomodoro!</h1>
    <p id="status">Tempo de foco</p>
    <div id="timer">25:00</div>
    <div id="controls">
        <button id="btn-iniciar">Iniciar</button>
        <button id="btn-pausar">Pausar</button>
        <button id="btn-resetar">Reiniciar</button>
    </div>

    <!-- Configuração do tempo -->
    <div>
        <h3>Ajuste de tempo</h3>
        <div>
            <label>Tempo de foco:</label>
            <input type="number" id="tempo-foco" value="25" min="1" max="60">
        </div>
        <div>
            <label>Pausa curta:</label>
            <input type="number" id="pausa-curta" value="5" min="1" max="30">
        </div>
        <div>
            <label>Pausa longa:</label>
            <input type="number" id="pausa-longa" value="15" min="1" max="60">
        </div>
        <button id="btn-salvar-config">Salvar Configurações</button>
    </div>

    <script src="pomodoro.js"></script>
</body>
</html>
